persistence:
  enabled: false
grafana.ini:
  plugins:
    allow_loading_unsigned_plugins: custom-chatbot-panel
# Mount plugin directory
extraVolumeMounts:
  - name: custom-plugins
    mountPath: /var/lib/grafana/plugins

extraVolumes:
  - name: custom-plugins
    emptyDir: {}

# Init container to download and unzip the plugin
extraInitContainers:
  - name: download-chatbot-plugin
    image: docker.io/curlimages/curl:7.85.0
    command:
      - sh
      - -c
      - |
        curl -L -H "Accept: application/octet-stream" "https://github.com/nourhankhalifa/grafana-chatbot/releases/download/0.1.0/custom-chatbot-panel.zip" -k -o /var/lib/grafana/plugins/custom-chatbot-panel.zip
        unzip /var/lib/grafana/plugins/custom-chatbot-panel.zip -d /var/lib/grafana/plugins/
        rm /var/lib/grafana/plugins/custom-chatbot-panel.zip
    volumeMounts:
      - name: custom-plugins
        mountPath: /var/lib/grafana/plugins